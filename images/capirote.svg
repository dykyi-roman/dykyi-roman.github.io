<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 80" width="48" height="80">
  <!-- Nazareno - white robed figure with tall capirote, Semana Santa style -->

  <!-- Tall pointed capirote -->
  <polygon points="24,1 18,28 30,28" fill="#F5F0E8" stroke="#D5CEBC" stroke-width="1"/>

  <!-- Shoulder drape from capirote -->
  <path d="M18,28 L14,38 L24,41 L34,38 L30,28 Z" fill="#F5F0E8" stroke="#D5CEBC" stroke-width="1"/>

  <!-- Eye slit -->
  <rect x="20" y="24" width="8" height="2.5" rx="1" fill="#2a2a2a"/>

  <!-- Robe body -->
  <path d="M14,38 L11,74 Q11,76 13,76 L35,76 Q37,76 37,74 L34,38 Z" fill="#F5F0E8" stroke="#D5CEBC" stroke-width="1"/>

  <!-- Purple/blue sash across chest -->
  <path d="M18,38 L17,54 L20,54 L21,38 Z" fill="#3B2D8E" opacity="0.85"/>
  <path d="M30,38 L31,54 L28,54 L27,38 Z" fill="#3B2D8E" opacity="0.85"/>

  <!-- Belt cord -->
  <line x1="13" y1="54" x2="35" y2="54" stroke="#C8B76D" stroke-width="1.5"/>

  <!-- Left arm holding tall candle -->
  <path d="M14,40 L7,50 L9,52 L16,43" fill="#F5F0E8" stroke="#D5CEBC" stroke-width="1"/>

  <!-- Right arm -->
  <path d="M34,40 L39,49 L37,51 L32,43" fill="#F5F0E8" stroke="#D5CEBC" stroke-width="1"/>

  <!-- Tall candle -->
  <rect x="5.5" y="20" width="2.2" height="32" rx="1" fill="#F5E6CA" stroke="#D4C5A9" stroke-width="0.6"/>
  <!-- Candle flame -->
  <path d="M6.6,20 Q5,16.5 6.6,13 Q8.2,16.5 6.6,20" fill="#FF9500"/>
  <path d="M6.6,19 Q5.7,17 6.6,14.5 Q7.5,17 6.6,19" fill="#FFD700"/>

  <!-- Feet -->
  <ellipse cx="19" cy="76.5" rx="4" ry="1.3" fill="#D5CEBC"/>
  <ellipse cx="29" cy="76.5" rx="4" ry="1.3" fill="#D5CEBC"/>
</svg>