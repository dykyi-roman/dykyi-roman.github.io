<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Pattern Visualizer - Dykyi Roman</title>
    <meta name="description" content="Interactive visualizer for GoF design patterns: Creational, Structural, and Behavioral patterns with animated UML diagrams and runtime flows.">
    <meta name="author" content="Dykyi Roman">
    <meta property="og:title" content="Design Pattern Visualizer - Dykyi Roman">
    <meta property="og:description" content="Interactive visualizer for GoF design patterns with animated UML class diagrams and object creation flows.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dykyi-roman.github.io/projects/pattern-visualizer/">
    <link rel="icon" href="../../icon.ico" type="image/x-icon">
    <link rel="canonical" href="https://dykyi-roman.github.io/projects/pattern-visualizer/">
    <link rel="stylesheet" type="text/css" href="../../resources/style.css">
    <link rel="stylesheet" href="../../resources/navigation.css">
    <link rel="stylesheet" href="../../resources/article-style.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>
<div class="container">
    <div id="header-container"></div>
    <script>
        fetch('../../headers.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            })
            .catch(error => console.error('Error loading header:', error));
    </script>

    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/index.html" data-i18n="ui.breadcrumb.home">Home</a>
        <span class="breadcrumb-separator">&rsaquo;</span>
        <a href="/pages/projects.html" data-i18n="ui.breadcrumb.projects">Projects</a>
        <span class="breadcrumb-separator">&rsaquo;</span>
        <span class="breadcrumb-current" data-i18n="pv.title">Design Pattern Visualizer</span>
        <div class="lang-switcher" id="lang-switcher"></div>
    </nav>

    <div class="article-container pv-page">
        <div class="article-header">
            <h1 class="article-title" data-i18n="pv.title">Design Pattern Visualizer</h1>
        </div>

        <!-- Category Bar -->
        <div class="pv-category-bar" role="tablist" aria-label="Pattern category">
            <button class="pv-category active" data-category="creational" role="tab" aria-selected="true">Creational</button>
            <button class="pv-category disabled" data-category="structural" role="tab" aria-selected="false" disabled title="Coming soon">Structural</button>
            <button class="pv-category disabled" data-category="behavioral" role="tab" aria-selected="false" disabled title="Coming soon">Behavioral</button>
        </div>

        <!-- Pattern Navigation (Level 1) -->
        <div class="pv-nav" id="pv-nav" role="tablist" aria-label="Select design pattern">
            <button class="pv-tab active" data-pattern="simple-factory" role="tab" aria-selected="true" data-i18n="simple-factory.name">Simple Factory</button>
            <button class="pv-tab" data-pattern="static-factory" role="tab" aria-selected="false" data-i18n="static-factory.name">Static Factory</button>
            <button class="pv-tab" data-pattern="factory-method" role="tab" aria-selected="false" data-i18n="factory-method.name">Factory Method</button>
            <button class="pv-tab" data-pattern="abstract-factory" role="tab" aria-selected="false" data-i18n="abstract-factory.name">Abstract Factory</button>
            <button class="pv-tab" data-pattern="builder" role="tab" aria-selected="false" data-i18n="builder.name">Builder</button>
            <button class="pv-tab" data-pattern="prototype" role="tab" aria-selected="false" data-i18n="prototype.name">Prototype</button>
            <button class="pv-tab" data-pattern="singleton" role="tab" aria-selected="false" data-i18n="singleton.name">Singleton</button>
            <button class="pv-tab" data-pattern="pool" role="tab" aria-selected="false" data-i18n="pool.name">Object Pool</button>
        </div>

        <!-- Mode Tabs (Level 2) -->
        <div class="mode-tabs" id="mode-tabs" role="tablist" aria-label="Select mode"></div>

        <!-- Global Controls -->
        <div class="global-controls-placeholder" id="controls-placeholder"></div>
        <div class="global-controls" id="global-controls">
            <div class="controls-left">
                <button class="ctrl-btn run-btn" id="btn-run" title="Run pattern animation" data-i18n-title="ui.btn.run.animate.tooltip">&#x25B6; <span data-i18n="ui.btn.run.animate">Run</span></button>
                <button class="ctrl-btn pause-btn" id="btn-pause" title="Pause Cnb/ Resume animation" data-i18n-title="ui.btn.pause.tooltip" disabled>&#x23F8; <span data-i18n="ui.btn.pause">Pause</span></button>
                <button class="ctrl-btn reset-btn" id="btn-reset" title="Reset all state" data-i18n-title="ui.btn.reset.tooltip">&#x21BA; <span data-i18n="ui.btn.reset">Reset</span></button>
                <button class="step-btn" id="btn-step-mode" title="Toggle step-by-step mode" data-i18n-title="ui.btn.step_mode.tooltip">&#x23ED; <span data-i18n="ui.btn.step_mode">Step Mode</span></button>
                <button class="step-btn" id="btn-step-back" title="Step back" style="display:none" data-i18n-title="ui.btn.step_back.tooltip" disabled>&#x23EE;</button>
                <button class="step-btn" id="btn-step-fwd" title="Step forward" style="display:none" data-i18n-title="ui.btn.step_fwd.tooltip" disabled>&#x23ED;</button>
                <label class="speed-label" for="speed-range" data-i18n="ui.speed.label">Speed:</label>
                <input type="range" class="speed-range" id="speed-range" min="100" max="1200" value="600" step="50">
                <span class="speed-value" id="speed-value">Normal</span>
            </div>
            <div class="controls-right">
                <div class="stat-item"><span class="stat-label" data-i18n="ui.stat.steps">Steps</span><span class="stat-value" id="stat-steps">0</span></div>
                <div class="stat-item"><span class="stat-label" data-i18n="ui.stat.objects">Objects</span><span class="stat-value" id="stat-objects">0</span></div>
            </div>
        </div>

        <!-- Pattern Description -->
        <div class="pattern-desc" id="pattern-desc"></div>

        <!-- Collapsible Principles & Key Concepts -->
        <div class="pattern-details" id="pattern-details" style="display:none">
            <button class="pattern-details-toggle" id="pattern-details-toggle" aria-expanded="false">
                <span class="pattern-details-toggle-icon">&#x25B6;</span>
                <span data-i18n="ui.details.title">Principles &amp; Key Concepts</span>
            </button>
            <div class="pattern-details-body" id="pattern-details-body"></div>
        </div>

        <!-- Main Visualization Area -->
        <div class="viz-area" id="viz-area">
            <div id="pv-canvas"></div>
            <svg class="pv-svg-layer" id="pv-svg-layer"></svg>
        </div>

        <!-- Trade-offs Panel -->
        <div class="pattern-tradeoffs" id="tradeoffs-panel" style="display:none">
            <button class="pattern-tradeoffs-toggle" id="tradeoffs-toggle" aria-expanded="false">
                <span class="pattern-tradeoffs-toggle-icon">&#x25B6;</span>
                <span data-i18n="ui.tradeoffs.title">Trade-offs: Pros, Cons &amp; When to Use</span>
            </button>
            <div class="pattern-tradeoffs-body" id="tradeoffs-body"></div>
        </div>

        <!-- UML Legend -->
        <div class="dep-rules-panel" id="dep-rules-panel">
            <div class="dep-rules-header" data-i18n="ui.participants.title">Pattern Participants</div>
            <div class="dep-rules-body" id="dep-rules-body"></div>
        </div>

        <!-- Code Examples -->
        <div class="code-examples-panel" id="code-examples-panel" style="display:none">
            <button class="code-examples-toggle" id="code-examples-toggle" aria-expanded="false">
                <span class="code-examples-toggle-icon">&#x25B6;</span>
                <span data-i18n="ui.code_examples.title">Code Examples</span>
            </button>
            <div class="code-examples-body" id="code-examples-body">
                <div class="code-lang-tabs" id="code-lang-tabs" role="tablist"></div>
                <div class="code-block-wrapper" id="code-block-wrapper">
                    <button class="code-copy-btn" id="code-copy-btn" data-i18n="ui.btn.copy">Copy</button>
                    <pre class="code-pre" id="code-pre"><code id="code-content"></code></pre>
                </div>
            </div>
        </div>

        <!-- Event Log -->
        <div class="event-log-container">
            <div class="event-log-header">
                <span data-i18n="ui.log.header">Event Log</span>
                <div>
                    <button class="log-clear-btn" id="btn-copy-log" data-i18n="ui.btn.copy">Copy</button>
                    <button class="log-clear-btn" id="btn-clear-log" data-i18n="ui.btn.clear">Clear</button>
                </div>
            </div>
            <div class="event-log" id="event-log"></div>
        </div>
        <footer class="site-footer">
            <p>&copy; 2010-<span class="current-year"></span> Dykyi Roman</p>
            <div class="footer-links">
                <a href="https://github.com/dykyi-roman" target="_blank">GitHub</a>
                <a href="https://linkedin.com/in/roman-dykyi-43428543/" target="_blank">LinkedIn</a>
                <a href="mailto:mr.dukuy@gmail.com">Email</a>
            </div>
        </footer>
    </div>
</div>

<script>document.querySelector('.current-year').textContent = new Date().getFullYear();</script>
<script src="../../resources/i18n.js"></script>
<script>
    I18N._basePath = '../..';
    I18N.load('pattern-visualizer', '../..').then(function() {
        I18N.renderSwitcher('lang-switcher');
        I18N.applyToDOM();
    });
</script>
<script src="../../resources/back-to-top.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup-templating.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
<script src="js/engine.js"></script>
<script src="js/simple-factory.js"></script>
<script src="js/static-factory.js"></script>
<script src="js/factory-method.js"></script>
<script src="js/abstract-factory.js"></script>
<script src="js/builder.js"></script>
<script src="js/prototype.js"></script>
<script src="js/singleton.js"></script>
<script src="js/pool.js"></script>
<script src="js/app.js"></script>
<script>window.CHAT_SYSTEM_PROMPT = 'AI assistant для визуализатора GoF паттернов проектирования (Creational: Factory, Builder, Prototype, Singleton, Pool). Объясняй структуру UML, назначение, отличия похожих паттернов.';</script>
<link rel="stylesheet" href="../../resources/chat.css">
<script src="../../resources/chat.js"></script>
</body>
</html>
