<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="400" height="250" rx="12" fill="#141922"/>
  <rect x="6" y="6" width="388" height="238" rx="9" fill="#1a2030" stroke="#2a3444" stroke-width="1"/>

  <!-- Decorative dots -->
  <circle cx="30" cy="25" r="1" fill="#4a5568" opacity="0.5"/>
  <circle cx="370" cy="35" r="1.2" fill="#4a5568" opacity="0.4"/>
  <circle cx="55" cy="220" r="1" fill="#4a5568" opacity="0.5"/>
  <circle cx="345" cy="215" r="1" fill="#4a5568" opacity="0.4"/>
  <circle cx="200" cy="18" r="1" fill="#4a5568" opacity="0.3"/>
  <circle cx="160" cy="225" r="1" fill="#4a5568" opacity="0.4"/>
  <circle cx="85" cy="60" r="0.8" fill="#4a5568" opacity="0.3"/>
  <circle cx="315" cy="65" r="0.8" fill="#4a5568" opacity="0.3"/>

  <!-- Labels -->
  <text x="68" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#a78bfa" opacity="0.9">Producers</text>
  <text x="332" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#f6ad55" opacity="0.9">Consumers</text>

  <!-- Producer P1 -->
  <rect x="30" y="50" width="76" height="34" rx="6" fill="#2d2154" stroke="#7c5ce7" stroke-width="1.5"/>
  <text x="68" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#a78bfa">P1</text>

  <!-- Producer P2 -->
  <rect x="30" y="105" width="76" height="34" rx="6" fill="#2d2154" stroke="#7c5ce7" stroke-width="1.5"/>
  <text x="68" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#a78bfa">P2</text>

  <!-- Producer P3 -->
  <rect x="30" y="160" width="76" height="34" rx="6" fill="#2d2154" stroke="#7c5ce7" stroke-width="1.5"/>
  <text x="68" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#a78bfa">P3</text>

  <!-- Consumer C1 -->
  <rect x="294" y="50" width="76" height="34" rx="6" fill="#3d2a14" stroke="#f0932b" stroke-width="1.5"/>
  <text x="332" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f6ad55">C1</text>

  <!-- Consumer C2 -->
  <rect x="294" y="105" width="76" height="34" rx="6" fill="#3d2a14" stroke="#f0932b" stroke-width="1.5"/>
  <text x="332" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f6ad55">C2</text>

  <!-- Consumer C3 -->
  <rect x="294" y="160" width="76" height="34" rx="6" fill="#3d2a14" stroke="#f0932b" stroke-width="1.5"/>
  <text x="332" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f6ad55">C3</text>

  <!-- Broker box -->
  <rect x="155" y="45" width="90" height="155" rx="10" fill="#e06050" stroke="#e8786a" stroke-width="1.5"/>

  <!-- Broker icon (circle) -->
  <circle cx="200" cy="72" r="10" fill="none" stroke="#fff" stroke-width="2" opacity="0.9"/>

  <!-- Broker horizontal lines -->
  <rect x="175" y="100" width="50" height="5" rx="2.5" fill="#fff" opacity="0.9"/>
  <rect x="175" y="118" width="50" height="5" rx="2.5" fill="#fff" opacity="0.9"/>
  <rect x="175" y="136" width="50" height="5" rx="2.5" fill="#fff" opacity="0.9"/>

  <!-- Broker label -->
  <text x="200" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" opacity="0.95">BROKER</text>

  <!-- Connection lines: Producers → Broker -->
  <line x1="106" y1="67" x2="155" y2="80" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="106" y1="122" x2="155" y2="122" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="106" y1="177" x2="155" y2="165" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Connection lines: Broker → Consumers -->
  <line x1="245" y1="80" x2="294" y2="67" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="245" y1="122" x2="294" y2="122" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="245" y1="165" x2="294" y2="177" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Animated dots on connections -->
  <circle r="3" fill="#89b4fa" opacity="0.9">
    <animateMotion dur="2s" repeatCount="indefinite" path="M106,67 L155,80"/>
  </circle>
  <circle r="3" fill="#89b4fa" opacity="0.9">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M106,122 L155,122"/>
  </circle>
  <circle r="3" fill="#f38ba8" opacity="0.9">
    <animateMotion dur="2s" repeatCount="indefinite" path="M245,80 L294,67"/>
  </circle>
  <circle r="3" fill="#f38ba8" opacity="0.9">
    <animateMotion dur="2.4s" repeatCount="indefinite" path="M245,165 L294,177"/>
  </circle>
</svg>