<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141922"/>
      <stop offset="100%" style="stop-color:#1a2030"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="12"/>

  <!-- Layered boxes -->
  <rect x="30" y="30" width="150" height="30" rx="4" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.8"/>
  <text x="105" y="50" text-anchor="middle" fill="#6366F1" font-size="10" font-family="system-ui">Presentation</text>

  <rect x="30" y="70" width="150" height="30" rx="4" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
  <text x="105" y="90" text-anchor="middle" fill="#6366F1" font-size="10" font-family="system-ui">Application</text>

  <rect x="30" y="110" width="150" height="30" rx="4" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.4"/>
  <text x="105" y="130" text-anchor="middle" fill="#6366F1" font-size="10" font-family="system-ui">Domain</text>

  <rect x="30" y="150" width="150" height="30" rx="4" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.3"/>
  <text x="105" y="170" text-anchor="middle" fill="#6366F1" font-size="10" font-family="system-ui">Infrastructure</text>

  <!-- Concentric circles (Clean) -->
  <circle cx="300" cy="100" r="55" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.3"/>
  <circle cx="300" cy="100" r="40" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
  <circle cx="300" cy="100" r="25" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
  <circle cx="300" cy="100" r="12" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="300" y="104" text-anchor="middle" fill="#8B5CF6" font-size="7" font-family="system-ui">Core</text>

  <!-- Hexagon -->
  <polygon points="80,230 120,210 160,230 160,260 120,280 80,260" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.7"/>
  <text x="120" y="250" text-anchor="middle" fill="#06B6D4" font-size="9" font-family="system-ui">Hex</text>

  <!-- Small adapters around hex -->
  <rect x="40" y="225" width="30" height="14" rx="2" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.4"/>
  <rect x="170" y="225" width="30" height="14" rx="2" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.4"/>
  <rect x="40" y="255" width="30" height="14" rx="2" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.4"/>
  <rect x="170" y="255" width="30" height="14" rx="2" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.4"/>

  <!-- CQRS split -->
  <rect x="230" y="190" width="70" height="90" rx="4" fill="none" stroke="#10B981" stroke-width="1" opacity="0.5"/>
  <text x="265" y="205" text-anchor="middle" fill="#10B981" font-size="8" font-family="system-ui">Command</text>
  <rect x="310" y="190" width="70" height="90" rx="4" fill="none" stroke="#10B981" stroke-width="1" opacity="0.5"/>
  <text x="345" y="205" text-anchor="middle" fill="#10B981" font-size="8" font-family="system-ui">Query</text>

  <!-- Flow arrows -->
  <line x1="105" y1="60" x2="105" y2="70" stroke="#6366F1" stroke-width="1" opacity="0.5"/>
  <line x1="105" y1="100" x2="105" y2="110" stroke="#6366F1" stroke-width="1" opacity="0.5"/>
  <line x1="105" y1="140" x2="105" y2="150" stroke="#6366F1" stroke-width="1" opacity="0.5"/>

  <!-- Title -->
  <text x="200" y="296" text-anchor="middle" fill="#8892a4" font-size="9" font-family="system-ui" opacity="0.6">Architecture Visualizer</text>
</svg>