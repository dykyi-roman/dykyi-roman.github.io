<!DOCTYPывE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Visualizer - Dykyi Roman</title>
    <meta name="description" content="Interactive visualizer for software architecture patterns: Layered, Clean, Hexagonal, DDD, CQRS, Event Sourcing, EDA, MVC/MVP/MVVM.">
    <meta name="author" content="Dykyi Roman">
    <meta property="og:title" content="Architecture Visualizer - Dykyi Roman">
    <meta property="og:description" content="Interactive visualizer for software architecture patterns with animated request flows and dependency rules.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dykyi-roman.github.io/projects/architecture-visualizer/">
    <link rel="icon" href="../../icon.ico" type="image/x-icon">
    <link rel="canonical" href="https://dykyi-roman.github.io/projects/architecture-visualizer/">
    <link rel="stylesheet" type="text/css" href="../../resources/style.css">
    <link rel="stylesheet" href="../../resources/navigation.css">
    <link rel="stylesheet" href="../../resources/article-style.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div id="header-container"></div>
    <script>
        fetch('../../headers.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            })
            .catch(error => console.error('Error loading header:', error));
    </script>

    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/index.html" data-i18n="ui.breadcrumb.home">Home</a>
        <span class="breadcrumb-separator">&rsaquo;</span>
        <a href="/pages/projects.html" data-i18n="ui.breadcrumb.projects">Projects</a>
        <span class="breadcrumb-separator">&rsaquo;</span>
        <span class="breadcrumb-current" data-i18n="arch.title">Architecture Visualizer</span>
        <div class="lang-switcher" id="lang-switcher"></div>
    </nav>

    <div class="article-container archv-page">
        <div class="article-header">
            <h1 class="article-title" data-i18n="arch.title">Architecture Visualizer</h1>
        </div>

        <!-- Architecture Navigation (Level 1) -->
        <div class="arch-nav" role="tablist" aria-label="Select architecture pattern">
            <button class="arch-tab active" data-arch="mvc" role="tab" aria-selected="true">MVC</button>
            <button class="arch-tab" data-arch="layered" role="tab" aria-selected="false">Layered</button>
            <button class="arch-tab" data-arch="clean" role="tab" aria-selected="false">Clean</button>
            <button class="arch-tab" data-arch="hexagonal" role="tab" aria-selected="false">Hexagonal</button>
            <button class="arch-tab" data-arch="cqrs" role="tab" aria-selected="false">CQRS</button>
            <button class="arch-tab" data-arch="eventsourcing" role="tab" aria-selected="false">Event Sourcing</button>
            <button class="arch-tab" data-arch="eda" role="tab" aria-selected="false">EDA</button>
            <button class="arch-tab" data-arch="microservices" role="tab" aria-selected="false">Microservices</button>
            <button class="arch-tab" data-arch="ddd" role="tab" aria-selected="false">DDD</button>
        </div>

        <!-- Mode Tabs (Level 2) -->
        <div class="mode-tabs" id="mode-tabs" role="tablist" aria-label="Select request mode"></div>

        <!-- Global Controls -->
        <div class="global-controls-placeholder" id="controls-placeholder"></div>
        <div class="global-controls" id="global-controls">
            <div class="controls-left">
                <button class="ctrl-btn run-btn" id="btn-run" title="Send request through architecture" data-i18n-title="arch.btn.run.tooltip">&#x25B6; <span data-i18n="ui.btn.run">Send Request</span></button>
                <button class="ctrl-btn pause-btn" id="btn-pause" title="Pause / Resume animation" data-i18n-title="ui.btn.pause.tooltip" disabled>&#x23F8; <span data-i18n="ui.btn.pause">Pause</span></button>
                <button class="ctrl-btn reset-btn" id="btn-reset" title="Reset all state" data-i18n-title="ui.btn.reset.tooltip">&#x21BA; <span data-i18n="ui.btn.reset">Reset</span></button>
                <button class="step-btn" id="btn-step-mode" title="Toggle step-by-step mode" data-i18n-title="ui.btn.step_mode.tooltip">&#x23ED; <span data-i18n="ui.btn.step_mode">Step Mode</span></button>
                <button class="step-btn" id="btn-step-back" title="Step back" data-i18n-title="ui.btn.step_back.tooltip" style="display:none" disabled>&#x23EE;</button>
                <button class="step-btn" id="btn-step-fwd" title="Step forward" data-i18n-title="ui.btn.step_fwd.tooltip" style="display:none" disabled>&#x23ED;</button>
                <label class="speed-label" for="speed-range" data-i18n="ui.speed.label">Speed:</label>
                <input type="range" class="speed-range" id="speed-range" min="100" max="1200" value="600" step="50">
                <span class="speed-value" id="speed-value">Normal</span>
            </div>
            <div class="controls-right">
                <div class="stat-item"><span class="stat-label" data-i18n="ui.stat.layers">Layers</span><span class="stat-value" id="stat-layers">0</span></div>
                <div class="stat-item"><span class="stat-label" data-i18n="ui.stat.hit">Hit</span><span class="stat-value" id="stat-components">0</span></div>
            </div>
        </div>

        <!-- Pattern Description -->
        <div class="pattern-desc" id="pattern-desc"></div>

        <!-- Collapsible Principles & Key Concepts -->
        <div class="pattern-details" id="pattern-details" style="display:none">
            <button class="pattern-details-toggle" id="pattern-details-toggle" aria-expanded="false">
                <span class="pattern-details-toggle-icon">&#x25B6;</span>
                <span data-i18n="ui.details.title">Principles &amp; Key Concepts</span>
            </button>
            <div class="pattern-details-body" id="pattern-details-body"></div>
        </div>

        <!-- Main Visualization Area -->
        <div class="viz-area" id="viz-area">
            <div id="archv-canvas"></div>
            <svg class="archv-svg-layer" id="archv-svg-layer"></svg>
        </div>

        <!-- Trade-offs Panel -->
        <div class="pattern-tradeoffs" id="tradeoffs-panel" style="display:none">
            <button class="pattern-tradeoffs-toggle" id="tradeoffs-toggle" aria-expanded="false">
                <span class="pattern-tradeoffs-toggle-icon">&#x25B6;</span>
                <span data-i18n="ui.tradeoffs.title">Trade-offs: Pros, Cons &amp; When to Use</span>
            </button>
            <div class="pattern-tradeoffs-body" id="tradeoffs-body"></div>
        </div>

        <!-- Dependency Rules Panel -->
        <div class="dep-rules-panel" id="dep-rules-panel">
            <div class="dep-rules-header" data-i18n="ui.dep_rules.title">Dependency Rules</div>
            <div class="dep-rules-body" id="dep-rules-body"></div>
        </div>

        <!-- Event Log -->
        <div class="event-log-container">
            <div class="event-log-header">
                <span data-i18n="ui.log.header">Event Log</span>
                <div>
                    <button class="log-clear-btn" id="btn-copy-log" data-i18n="ui.btn.copy">Copy</button>
                    <button class="log-clear-btn" id="btn-clear-log" data-i18n="ui.btn.clear">Clear</button>
                </div>
            </div>
            <div class="event-log" id="event-log"></div>
        </div>
        <footer class="site-footer">
            <p>&copy; 2010-<span class="current-year"></span> Dykyi Roman</p>
            <div class="footer-links">
                <a href="https://github.com/dykyi-roman" target="_blank">GitHub</a>
                <a href="https://linkedin.com/in/roman-dykyi-43428543/" target="_blank">LinkedIn</a>
                <a href="mailto:mr.dukuy@gmail.com">Email</a>
            </div>
        </footer>
    </div>
</div>

<script>document.querySelector('.current-year').textContent = new Date().getFullYear();</script>
<script src="../../resources/i18n.js"></script>
<script>
    I18N._basePath = '../..';
    I18N.load('architecture-visualizer', '../..').then(function() {
        I18N.renderSwitcher('lang-switcher');
        I18N.applyToDOM();
    });
</script>
<script src="../../resources/back-to-top.js"></script>
<script src="js/engine.js"></script>
<script src="js/mvc.js"></script>
<script src="js/layered.js"></script>
<script src="js/clean.js"></script>
<script src="js/hexagonal.js"></script>
<script src="js/cqrs.js"></script>
<script src="js/eventsourcing.js"></script>
<script src="js/eda.js"></script>
<script src="js/microservices.js"></script>
<script src="js/ddd.js"></script>
<script src="js/app.js"></script>
<script>window.CHAT_SYSTEM_PROMPT = 'AI assistant для интерактивного визуализатора архитектурных паттернов (MVC, Layered, Clean, Hexagonal, DDD, CQRS, Event Sourcing, EDA, Microservices). Объясняй потоки данных, слои, компоненты и когда применять каждый паттерн.';</script>
<link rel="stylesheet" href="../../resources/chat.css">
<script src="../../resources/chat.js"></script>
</body>
</html>
