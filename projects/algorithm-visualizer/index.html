<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../../resources/analytics.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Visualizer - Dykyi Roman</title>
    <meta name="description" content="Interactive visualizer for popular algorithms: sorting, searching, graph, tree, dynamic programming, and more with step-by-step animations.">
    <meta name="author" content="Dykyi Roman">
    <meta property="og:title" content="Algorithm Visualizer - Dykyi Roman">
    <meta property="og:description" content="Interactive visualizer for popular algorithms with animated step-by-step execution.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dykyi-roman.github.io/projects/algorithm-visualizer/">
    <link rel="icon" href="../../icon.ico" type="image/x-icon">
    <link rel="canonical" href="https://dykyi-roman.github.io/projects/algorithm-visualizer/">
    <link rel="stylesheet" type="text/css" href="../../resources/style.css">
    <link rel="stylesheet" href="../../resources/navigation.css">
    <link rel="stylesheet" href="../../resources/article-style.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div id="header-container"></div>
    <script>
        fetch('../../headers.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            })
            .catch(error => console.error('Error loading header:', error));
    </script>

    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/index.html" data-i18n="ui.breadcrumb.home">Home</a>
        <span class="breadcrumb-separator">&rsaquo;</span>
        <a href="/pages/projects.html" data-i18n="ui.breadcrumb.projects">Projects</a>
        <span class="breadcrumb-separator">&rsaquo;</span>
        <span class="breadcrumb-current" data-i18n="av.title">Algorithm Visualizer</span>
        <div class="lang-switcher" id="lang-switcher"></div>
    </nav>

    <div class="article-container av-page">
        <div class="article-header">
            <h1 class="article-title" data-i18n="av.title">Algorithm Visualizer</h1>
        </div>

        <!-- Category Bar -->
        <div class="av-category-bar" role="tablist" aria-label="Algorithm category">
            <button class="av-category active" data-category="sorting" role="tab" aria-selected="true">Sorting</button>
            <button class="av-category" data-category="searching" role="tab" aria-selected="false">Searching</button>
            <button class="av-category" data-category="graph" role="tab" aria-selected="false">Graph</button>
            <button class="av-category" data-category="tree" role="tab" aria-selected="false">Tree</button>
            <button class="av-category" data-category="dp" role="tab" aria-selected="false">Dynamic Programming</button>
            <button class="av-category" data-category="string" role="tab" aria-selected="false">String</button>
            <button class="av-category" data-category="hashing" role="tab" aria-selected="false">Hashing</button>
        </div>

        <!-- Algorithm Navigation -->
        <div class="av-nav" id="av-nav" role="tablist" aria-label="Select algorithm">
            <button class="av-tab active" data-algorithm="bubble-sort" role="tab" aria-selected="true">Bubble Sort</button>
            <button class="av-tab" data-algorithm="selection-sort" role="tab" aria-selected="false">Selection Sort</button>
            <button class="av-tab" data-algorithm="insertion-sort" role="tab" aria-selected="false">Insertion Sort</button>
            <button class="av-tab disabled" data-algorithm="merge-sort" role="tab" aria-selected="false">Merge Sort</button>
            <button class="av-tab disabled" data-algorithm="quick-sort" role="tab" aria-selected="false">Quick Sort</button>
            <button class="av-tab disabled" data-algorithm="heap-sort" role="tab" aria-selected="false">Heap Sort</button>
            <button class="av-tab disabled" data-algorithm="counting-sort" role="tab" aria-selected="false">Counting Sort</button>
            <button class="av-tab disabled" data-algorithm="radix-sort" role="tab" aria-selected="false">Radix Sort</button>
        </div>

        <!-- Mode Tabs -->
        <div class="mode-tabs" id="mode-tabs" role="tablist" aria-label="Select mode"></div>

        <!-- Global Controls -->
        <div class="global-controls-placeholder" id="controls-placeholder"></div>
        <div class="global-controls" id="global-controls">
            <div class="controls-left">
                <button class="ctrl-btn run-btn" id="btn-run" title="Run algorithm animation" data-i18n-title="ui.btn.run.animate.tooltip">&#x25B6; <span data-i18n="ui.btn.run.animate">Run</span></button>
                <button class="ctrl-btn pause-btn" id="btn-pause" title="Pause / Resume animation" data-i18n-title="ui.btn.pause.tooltip" disabled>&#x23F8; <span data-i18n="ui.btn.pause">Pause</span></button>
                <button class="ctrl-btn reset-btn" id="btn-reset" title="Reset and generate new array" data-i18n-title="ui.btn.reset.tooltip">&#x21BA; <span data-i18n="ui.btn.reset">Reset</span></button>
                <button class="step-btn" id="btn-step-mode" title="Toggle step-by-step mode" data-i18n-title="ui.btn.step_mode.tooltip">&#x23ED; <span data-i18n="ui.btn.step_mode">Step Mode</span></button>
                <button class="step-btn" id="btn-step-back" title="Step back" style="display:none" data-i18n-title="ui.btn.step_back.tooltip" disabled>&#x23EE;</button>
                <button class="step-btn" id="btn-step-fwd" title="Step forward" style="display:none" data-i18n-title="ui.btn.step_fwd.tooltip" disabled>&#x23ED;</button>
                <label class="speed-label" for="speed-range" data-i18n="ui.speed.label">Speed:</label>
                <input type="range" class="speed-range" id="speed-range" min="100" max="1200" value="600" step="50">
                <span class="speed-value" id="speed-value">Normal</span>
            </div>
            <div class="controls-right">
                <div class="stat-item"><span class="stat-label" data-i18n="av.stat.comparisons">Comparisons</span><span class="stat-value" id="stat-comparisons">0</span></div>
                <div class="stat-item"><span class="stat-label" data-i18n="av.stat.swaps">Swaps</span><span class="stat-value" id="stat-swaps">0</span></div>
            </div>
        </div>

        <!-- Algorithm Description -->
        <div class="av-desc" id="av-desc"></div>

        <!-- Collapsible Principles & Key Concepts -->
        <div class="av-details" id="av-details" style="display:none">
            <button class="av-details-toggle" id="av-details-toggle" aria-expanded="false">
                <span class="av-details-toggle-icon">&#x25B6;</span>
                <span data-i18n="ui.details.title">Principles &amp; Key Concepts</span>
            </button>
            <div class="av-details-body" id="av-details-body"></div>
        </div>

        <!-- Main Visualization Area -->
        <div class="viz-area" id="viz-area">
            <div id="av-canvas"></div>
            <!-- Bar Legend -->
            <div class="av-legend">
                <div class="av-legend-item"><span class="av-legend-swatch av-legend-default"></span> <span data-i18n="av.legend.default">Default</span></div>
                <div class="av-legend-item"><span class="av-legend-swatch av-legend-comparing"></span> <span data-i18n="av.legend.comparing">Comparing</span></div>
                <div class="av-legend-item"><span class="av-legend-swatch av-legend-swapping"></span> <span data-i18n="av.legend.swapping">Swapping</span></div>
                <div class="av-legend-item"><span class="av-legend-swatch av-legend-sorted"></span> <span data-i18n="av.legend.sorted">Sorted</span></div>
            </div>
        </div>

        <!-- Trade-offs Panel -->
        <div class="av-tradeoffs" id="tradeoffs-panel" style="display:none">
            <button class="av-tradeoffs-toggle" id="tradeoffs-toggle" aria-expanded="false">
                <span class="av-tradeoffs-toggle-icon">&#x25B6;</span>
                <span data-i18n="ui.tradeoffs.title">Trade-offs: Pros, Cons &amp; When to Use</span>
            </button>
            <div class="av-tradeoffs-body" id="tradeoffs-body"></div>
        </div>

        <!-- Complexity Panel -->
        <div class="dep-rules-panel" id="dep-rules-panel">
            <div class="dep-rules-header" data-i18n="av.complexity.title">Complexity &amp; Properties</div>
            <div class="dep-rules-body" id="dep-rules-body"></div>
        </div>

        <!-- Event Log -->
        <div class="event-log-container">
            <div class="event-log-header">
                <span data-i18n="ui.log.header">Event Log</span>
                <div>
                    <button class="log-clear-btn" id="btn-copy-log" data-i18n="ui.btn.copy">Copy</button>
                    <button class="log-clear-btn" id="btn-clear-log" data-i18n="ui.btn.clear">Clear</button>
                </div>
            </div>
            <div class="event-log" id="event-log"></div>
        </div>
        <footer class="site-footer">
            <p>&copy; 2010-<span class="current-year"></span> Dykyi Roman</p>
            <div class="footer-links">
                <a href="https://github.com/dykyi-roman" target="_blank">GitHub</a>
                <a href="https://linkedin.com/in/roman-dykyi-43428543/" target="_blank">LinkedIn</a>
                <a href="mailto:mr.dukuy@gmail.com">Email</a>
            </div>
        </footer>
    </div>
</div>

<script>document.querySelector('.current-year').textContent = new Date().getFullYear();</script>
<script src="../../resources/i18n.js"></script>
<script>
    I18N._basePath = '../..';
    I18N.load('algorithm-visualizer', '../..').then(function() {
        I18N.renderSwitcher('lang-switcher');
        I18N.applyToDOM();
    });
</script>
<script src="../../resources/back-to-top.js"></script>
<script src="js/engine.js"></script>
<script src="js/bubble-sort.js"></script>
<script src="js/selection-sort.js"></script>
<script src="js/insertion-sort.js"></script>
<script src="js/merge-sort.js"></script>
<script src="js/quick-sort.js"></script>
<script src="js/heap-sort.js"></script>
<script src="js/counting-sort.js"></script>
<script src="js/radix-sort.js"></script>
<script src="js/linear-search.js"></script>
<script src="js/binary-search.js"></script>
<script src="js/jump-search.js"></script>
<script src="js/interpolation-search.js"></script>
<script src="js/bfs.js"></script>
<script src="js/dfs.js"></script>
<script src="js/dijkstra.js"></script>
<script src="js/a-star.js"></script>
<script src="js/bst-operations.js"></script>
<script src="js/fibonacci.js"></script>
<script src="js/kmp.js"></script>
<script src="js/rabin-karp.js"></script>
<script src="js/boyer-moore.js"></script>
<script src="js/hash-table.js"></script>
<script src="js/app.js"></script>
<script>window.CHAT_SYSTEM_PROMPT = 'AI assistant для визуализатора алгоритмов. Объясняй работу сортировок (Bubble Sort и др.), сложность, шаги выполнения, сравнения алгоритмов.';</script>
<link rel="stylesheet" href="../../resources/chat.css">
<script src="../../resources/chat.js"></script>
</body>
</html>
