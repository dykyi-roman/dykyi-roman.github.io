<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../../resources/analytics.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitFlow Visualizer - Dykyi Roman</title>
    <meta name="description" content="Interactive visualizer for Git branching strategies: Classic GitFlow, GitHub Flow, GitLab Flow, Trunk-Based, OneFlow, and more.">
    <meta name="author" content="Dykyi Roman">
    <meta property="og:title" content="GitFlow Visualizer - Dykyi Roman">
    <meta property="og:description" content="Interactive visualizer for 11 Git branching strategies with animated SVG git graphs and step-by-step animation.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dykyi-roman.github.io/projects/gitflow-visualizer/">
    <link rel="icon" href="../../icon.ico" type="image/x-icon">
    <link rel="canonical" href="https://dykyi-roman.github.io/projects/gitflow-visualizer/">
    <link rel="stylesheet" type="text/css" href="../../resources/style.css">
    <link rel="stylesheet" href="../../resources/navigation.css">
    <link rel="stylesheet" href="../../resources/article-style.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div id="header-container"></div>
    <script>
        fetch('../../headers.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            })
            .catch(error => console.error('Error loading header:', error));
    </script>

    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/index.html" data-i18n="ui.breadcrumb.home">Home</a>
        <span class="breadcrumb-separator">&rsaquo;</span>
        <a href="/pages/projects.html" data-i18n="ui.breadcrumb.projects">Projects</a>
        <span class="breadcrumb-separator">&rsaquo;</span>
        <span class="breadcrumb-current" data-i18n="gf.title">GitFlow Visualizer</span>
        <div class="lang-switcher" id="lang-switcher"></div>
    </nav>

    <div class="article-container gfv-page">
        <div class="article-header">
            <h1 class="article-title" data-i18n="article-title">GitFlow Visualizer</h1>
        </div>

        <!-- Flow Navigation (Level 1) -->
        <div class="flow-nav" role="tablist" aria-label="Select branching strategy">
            <button class="flow-tab active" data-flow="classic" role="tab" aria-selected="true">Classic</button>
            <button class="flow-tab" data-flow="github" role="tab" aria-selected="false">GitHub</button>
            <button class="flow-tab" data-flow="gitlab" role="tab" aria-selected="false">GitLab</button>
            <button class="flow-tab" data-flow="trunk" role="tab" aria-selected="false">Trunk-based</button>
            <button class="flow-tab" data-flow="oneflow" role="tab" aria-selected="false">OneFlow</button>
            <button class="flow-tab" data-flow="environment" role="tab" aria-selected="false">Environment</button>
            <button class="flow-tab" data-flow="release" role="tab" aria-selected="false">Release</button>
            <button class="flow-tab" data-flow="forking" role="tab" aria-selected="false">Forking</button>
            <button class="flow-tab" data-flow="ship-show-ask" role="tab" aria-selected="false">Ship/Show/Ask</button>
            <button class="flow-tab" data-flow="scaled" role="tab" aria-selected="false">Scaled</button>
            <button class="flow-tab" data-flow="cherrypick" role="tab" aria-selected="false">Cherry-pick</button>
        </div>

        <!-- Mode Tabs (Level 2) -->
        <div class="mode-tabs" id="mode-tabs" role="tablist" aria-label="Select scenario mode"></div>

        <!-- Global Controls -->
        <div class="global-controls-placeholder" id="controls-placeholder"></div>
        <div class="global-controls" id="global-controls">
            <div class="controls-left">
                <button class="ctrl-btn run-btn" id="btn-run" data-i18n-title="ui.btn.run.animate.tooltip" title="Run git flow animation">&#x25B6; <span data-i18n="ui.btn.run.animate">Animate Flow</span></button>
                <button class="ctrl-btn pause-btn" id="btn-pause" data-i18n-title="ui.btn.pause.tooltip" title="Pause / Resume animation" disabled>&#x23F8; <span data-i18n="ui.btn.pause">Pause</span></button>
                <button class="ctrl-btn reset-btn" id="btn-reset" data-i18n-title="ui.btn.reset.tooltip" title="Reset all state">&#x21BA; <span data-i18n="ui.btn.reset">Reset</span></button>
                <button class="step-btn" id="btn-step-mode" data-i18n-title="ui.btn.step_mode.tooltip" title="Toggle step-by-step mode">&#x23ED; <span data-i18n="ui.btn.step_mode">Step Mode</span></button>
                <button class="step-btn" id="btn-step-back" data-i18n-title="ui.btn.step_back.tooltip" title="Step back" style="display:none" disabled>&#x23EE;</button>
                <button class="step-btn" id="btn-step-fwd" data-i18n-title="ui.btn.step_fwd.tooltip" title="Step forward" style="display:none" disabled>&#x23ED;</button>
                <label class="speed-label" for="speed-range" data-i18n="ui.speed.label">Speed:</label>
                <input type="range" class="speed-range" id="speed-range" min="100" max="1200" value="600" step="50">
                <span class="speed-value" id="speed-value">Normal</span>
            </div>
            <div class="controls-right">
                <div class="stat-item"><span class="stat-label" data-i18n="ui.stat.branches">Branches</span><span class="stat-value" id="stat-branches">0</span></div>
                <div class="stat-item"><span class="stat-label" data-i18n="ui.stat.commits">Commits</span><span class="stat-value" id="stat-commits">0</span></div>
                <div class="stat-item"><span class="stat-label" data-i18n="ui.stat.merges">Merges</span><span class="stat-value" id="stat-merges">0</span></div>
                <div class="stat-item"><span class="stat-label" data-i18n="ui.stat.prs">PRs</span><span class="stat-value" id="stat-prs">0</span></div>
            </div>
        </div>

        <!-- Pattern Description -->
        <div class="pattern-desc" id="pattern-desc"></div>

        <!-- Collapsible Principles & Key Concepts -->
        <div class="pattern-details" id="pattern-details" style="display:none">
            <button class="pattern-details-toggle" id="pattern-details-toggle" aria-expanded="false">
                <span class="pattern-details-toggle-icon">&#x25B6;</span>
                <span data-i18n="ui.details.title">Principles &amp; Key Concepts</span>
            </button>
            <div class="pattern-details-body" id="pattern-details-body"></div>
        </div>

        <!-- Main Visualization Area -->
        <div class="viz-area" id="viz-area">
            <svg id="gfv-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
            <div class="gfv-flow-legend">
                <div class="legend-item">
                    <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="6" fill="#a6e3a1" stroke="#141922" stroke-width="2"/></svg>
                    <span>Commit</span>
                </div>
                <div class="legend-item">
                    <svg width="28" height="18" viewBox="0 0 28 18"><path d="M2 14 C10 14 18 4 26 4" stroke="#89b4fa" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
                    <span>Merge</span>
                </div>
                <div class="legend-item">
                    <svg width="28" height="18" viewBox="0 0 28 18"><path d="M2 4 C10 4 18 14 26 14" stroke="#cba6f7" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/></svg>
                    <span>Branch</span>
                </div>
                <div class="legend-item">
                    <svg width="28" height="18" viewBox="0 0 28 18"><path d="M2 14 C10 14 18 4 26 4" stroke="#89b4fa" stroke-width="2" stroke-dasharray="6 3" fill="none" opacity="0.8"/></svg>
                    <span>PR / MR</span>
                </div>
                <div class="legend-item">
                    <svg width="20" height="18" viewBox="0 0 20 18"><text x="10" y="15" text-anchor="middle" font-size="16">&#x1F352;</text></svg>
                    <span>Cherry-pick</span>
                </div>
                <div class="legend-item">
                    <svg width="28" height="18" viewBox="0 0 28 18"><line x1="4" y1="14" x2="14" y2="4" stroke="#cba6f7" stroke-width="2.5" stroke-dasharray="3 3" opacity="0.6"/><circle cx="14" cy="4" r="4" fill="#cba6f7" opacity="0.6"/><line x1="14" y1="14" x2="24" y2="4" stroke="#cba6f7" stroke-width="2.5" stroke-dasharray="3 3" opacity="0.6"/><circle cx="24" cy="4" r="4" fill="#cba6f7" opacity="0.6"/></svg>
                    <span>Rebase</span>
                </div>
                <div class="legend-item">
                    <svg width="24" height="18" viewBox="0 0 24 18"><rect x="1" y="3" width="22" height="12" rx="4" ry="4" fill="#f9e2af"/><text x="12" y="12" text-anchor="middle" font-size="9" font-weight="700" fill="#0d1117">v1.0</text></svg>
                    <span>Tag</span>
                </div>
                <div class="legend-item">
                    <svg width="18" height="18" viewBox="0 0 18 18"><text x="9" y="14" text-anchor="middle" font-size="14">&#x1F680;</text></svg>
                    <span>Deploy</span>
                </div>
                <div class="legend-item">
                    <svg width="24" height="18" viewBox="0 0 24 18"><line x1="12" y1="16" x2="12" y2="4" stroke="#89dceb" stroke-width="2" stroke-dasharray="4 3" opacity="0.7"/><polygon points="7,6 12,1 17,6" fill="#89dceb" opacity="0.8"/></svg>
                    <span>Fork</span>
                </div>
                <div class="legend-item">
                    <svg width="20" height="18" viewBox="0 0 20 18"><text x="10" y="14" text-anchor="middle" font-size="14">&#x2B06;</text></svg>
                    <span>Push</span>
                </div>
                <div class="legend-item">
                    <svg width="24" height="18" viewBox="0 0 24 18"><line x1="2" y1="9" x2="22" y2="9" stroke="#f38ba8" stroke-width="2.5" stroke-dasharray="4 4" opacity="0.5"/><line x1="9" y1="3" x2="15" y2="15" stroke="#f38ba8" stroke-width="2.5"/><line x1="15" y1="3" x2="9" y2="15" stroke="#f38ba8" stroke-width="2.5"/></svg>
                    <span>Delete</span>
                </div>
            </div>
        </div>

        <!-- Trade-offs Panel -->
        <div class="pattern-tradeoffs" id="tradeoffs-panel" style="display:none">
            <button class="pattern-tradeoffs-toggle" id="tradeoffs-toggle" aria-expanded="false">
                <span class="pattern-tradeoffs-toggle-icon">&#x25B6;</span>
                <span data-i18n="ui.tradeoffs.title">Trade-offs: Pros, Cons &amp; When to Use</span>
            </button>
            <div class="pattern-tradeoffs-body" id="tradeoffs-body"></div>
        </div>

        <!-- Branch Rules Panel -->
        <div class="dep-rules-panel" id="branch-rules-panel">
            <div class="dep-rules-header" data-i18n="ui.branch_rules.title">Branch Rules</div>
            <div class="dep-rules-body" id="branch-rules-body"></div>
        </div>

        <!-- Event Log -->
        <div class="event-log-container">
            <div class="event-log-header">
                <span data-i18n="ui.log.header">Event Log</span>
                <div>
                    <button class="log-clear-btn" id="btn-copy-log" data-i18n="ui.btn.copy">Copy</button>
                    <button class="log-clear-btn" id="btn-clear-log" data-i18n="ui.btn.clear">Clear</button>
                </div>
            </div>
            <div class="event-log" id="event-log"></div>
        </div>
        <footer class="site-footer">
            <p>&copy; 2010-<span class="current-year"></span> Dykyi Roman</p>
            <div class="footer-links">
                <a href="https://github.com/dykyi-roman" target="_blank">GitHub</a>
                <a href="https://linkedin.com/in/roman-dykyi-43428543/" target="_blank">LinkedIn</a>
                <a href="mailto:mr.dukuy@gmail.com">Email</a>
            </div>
        </footer>
    </div>
</div>

<script>document.querySelector('.current-year').textContent = new Date().getFullYear();</script>
<script src="../../resources/i18n.js"></script>
<script>
    I18N._basePath = '../..';
    I18N.load('gitflow-visualizer', '../..').then(function() {
        I18N.renderSwitcher('lang-switcher');
        I18N.applyToDOM();
    });
</script>
<script src="../../resources/back-to-top.js"></script>
<script src="js/engine.js"></script>
<script src="js/classic.js"></script>
<script src="js/github.js"></script>
<script src="js/gitlab.js"></script>
<script src="js/trunk.js"></script>
<script src="js/oneflow.js"></script>
<script src="js/environment.js"></script>
<script src="js/release.js"></script>
<script src="js/forking.js"></script>
<script src="js/ship-show-ask.js"></script>
<script src="js/scaled.js"></script>
<script src="js/cherrypick.js"></script>
<script src="js/app.js"></script>
<script>window.CHAT_SYSTEM_PROMPT = 'AI assistant для визуализатора 11 Git-стратегий (GitFlow, GitHub Flow, GitLab Flow, Trunk-Based, OneFlow и др.). Объясняй преимущества, недостатки и когда выбирать каждую стратегию.';</script>
<link rel="stylesheet" href="../../resources/chat.css">
<script src="../../resources/chat.js"></script>
</body>
</html>
