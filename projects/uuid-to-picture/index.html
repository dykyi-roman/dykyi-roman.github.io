<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convert UUIDs into unique visual dot-matrix images and back">
  <meta property="og:title" content="UUID to Picture">
  <meta property="og:description" content="Convert UUIDs into unique visual dot-matrix images and back. Pure vanilla JS, no dependencies.">
  <meta property="og:image" content="docs/example.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dykyi-roman.github.io/uuid-to-picture/">
  <title>UUID to Picture</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>UUID to Picture</h1>
    <p class="subtitle">Convert UUIDs to visual dot-matrix representations and back</p>
    <p class="subtitle">Link to <a target="_blank" href="https://github.com/dykyi-roman/uuid-to-picture">[GitHub]</a></p>
  </header>

  <main>
    <section class="section encode-section">
      <h2>UUID &rarr; Picture</h2>

      <div class="input-group">
        <label for="uuid-input">UUID</label>
        <div class="uuid-input-row">
          <input
            type="text"
            id="uuid-input"
            placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
            spellcheck="false"
            autocomplete="off"
          >
          <button id="btn-generate-uuid" type="button">Generate Random UUID</button>
        </div>
        <span id="uuid-error" class="error-message" hidden>Invalid UUID format</span>
      </div>

      <div class="colors-group">
        <label>Segment Colors</label>
        <div class="color-pickers">
          <div class="color-picker">
            <input type="color" id="color-seg1" value="#E74C3C">
            <span>Seg 1</span>
          </div>
          <div class="color-picker">
            <input type="color" id="color-seg2" value="#3498DB">
            <span>Seg 2</span>
          </div>
          <div class="color-picker">
            <input type="color" id="color-seg3" value="#2ECC71">
            <span>Seg 3</span>
          </div>
          <div class="color-picker">
            <input type="color" id="color-seg4" value="#F39C12">
            <span>Seg 4</span>
          </div>
          <div class="color-picker">
            <input type="color" id="color-seg5" value="#9B59B6">
            <span>Seg 5</span>
          </div>
        </div>
      </div>

      <button id="btn-generate-picture" type="button" class="btn-primary">Generate Picture</button>

      <div id="encode-result" class="result-area" hidden>
        <canvas id="encode-canvas"></canvas>
        <div class="download-buttons">
          <button id="btn-download-png" type="button">Download PNG</button>
          <button id="btn-download-svg" type="button">Download SVG</button>
        </div>
      </div>
    </section>

    <section class="section decode-section">
      <h2>Picture &rarr; UUID</h2>

      <div id="drop-zone" class="drop-zone">
        <p>Drag &amp; drop a PNG image here</p>
        <p class="drop-zone-or">or</p>
        <label class="file-label">
          Choose File
          <input type="file" id="file-input" accept=".png,image/png" hidden>
        </label>
      </div>

      <div id="decode-result" class="result-area" hidden>
        <canvas id="decode-canvas"></canvas>
        <div class="decoded-uuid-row">
          <label>Decoded UUID</label>
          <div class="uuid-output-row">
            <input type="text" id="decoded-uuid" readonly>
            <button id="btn-copy" type="button">Copy</button>
          </div>
          <span id="decode-confidence" class="confidence-label"></span>
        </div>
        <span id="decode-error" class="error-message" hidden></span>
      </div>
    </section>
  </main>

  <script src="js/uuid.js"></script>
  <script src="js/encoder.js"></script>
  <script src="js/canvas-renderer.js"></script>
  <script src="js/svg-renderer.js"></script>
  <script src="js/decoder.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
